# إعدادات Redis لكاش أقل سعر (Sallimni)
# ـ AOF: يضمن عدم ضياع الأسعار عند إعادة تشغيل السيرفر (يُعاد بناء الكاش من السجلّ).
#   التطبيق يحاول تفعيلها تلقائياً عبر CONFIG SET، لكن المزوّدات المُدارة قد تمنع ذلك،
#   فاضبطها هنا أو من لوحة الخدمة.
appendonly yes
appendfsync everysec

# إدارة الذاكرة: نحتفظ بالأسعار النشطة فقط. كل مفاتيح الكاش لها TTL (14 يوماً يُجدَّد
# عند كل تغيير سعر وعند التسخين اليومي)، فعند امتلاء الذاكرة يُخلى الأقدم انتهاءً صلاحيةً.
maxmemory 256mb
maxmemory-policy volatile-lru
